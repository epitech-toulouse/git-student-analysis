name: Convert to Claude Skill

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.skill'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert Copilot skill to Claude .skill archive
        id: convert
        uses: Nico-TekToulouse/skill-converter@v1
        with:
          skill_dirs: .
          output_dir: .

      - name: Upload .skill file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-student-analysis
          path: "*.skill"
          if-no-files-found: error
          retention-days: 90

      - name: Commit .skill file back to repository
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: "*.skill"
          commit-message: "chore: update git-student-analysis.skill [skip ci]"
          branch: chore/update-skill-file
          delete-branch: true
          title: "chore: update git-student-analysis.skill"
          body: "Automatic update of the `.skill` archive generated by the CI."
          labels: automated
